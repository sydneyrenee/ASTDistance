name: build

on:
  push:
    branches: [main, dev]
  pull_request:
  workflow_dispatch:

jobs:
  build-typescript:
    name: build (typescript)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: typescript/package-lock.json

      - name: Install dependencies
        working-directory: typescript
        run: npm ci

      - name: Build
        working-directory: typescript
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: typescript-dist
          path: typescript/dist/
          retention-days: 7

  build-cpp:
    name: build (cpp)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install CMake
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++

      - name: Configure
        run: |
          mkdir -p build
          cd build
          cmake ..

      - name: Build
        run: |
          cd build
          cmake --build . -- -j$(nproc)

      - name: Upload C++ binary
        uses: actions/upload-artifact@v4
        with:
          name: cpp-binary
          path: build/ast_distance
          retention-days: 7

  lint:
    name: lint (typescript)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: typescript/package-lock.json

      - name: Install dependencies
        working-directory: typescript
        run: npm ci

      - name: Lint
        working-directory: typescript
        run: npm run lint
        continue-on-error: true
